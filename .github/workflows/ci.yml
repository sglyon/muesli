name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Detect which files changed — no third-party actions
  changes:
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.check.outputs.native }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for native changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only HEAD^1 HEAD -- 'native/' '.github/workflows/ci.yml')
          else
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'native/' '.github/workflows/ci.yml')
          fi
          if [ -n "$FILES" ]; then
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "Native files changed:"
            echo "$FILES"
          else
            echo "native=false" >> "$GITHUB_OUTPUT"
            echo "No native files changed — skipping build"
          fi

  # Swift build + tests — only when native code changes
  build-and-test:
    needs: changes
    if: needs.changes.outputs.native == 'true'
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build (release)
        run: swift build --package-path native/MuesliNative -c release --product MuesliNativeApp

      - name: Run tests
        run: swift test --package-path native/MuesliNative

  # Gate job — always runs, always reports a status
  # This is the only required check in branch protection
  ci-gate:
    if: always()
    needs: [changes, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.build-and-test.result }}" =~ ^(success|skipped)$ ]]; then
            echo "CI passed (build-and-test: ${{ needs.build-and-test.result }})"
          else
            echo "CI failed (build-and-test: ${{ needs.build-and-test.result }})"
            exit 1
          fi
