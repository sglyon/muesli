name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'native/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'native/**'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build (release)
        run: swift build --package-path native/MuesliNative -c release --product MuesliNativeApp

      - name: Run tests
        run: swift test --package-path native/MuesliNative

  # Gate job for branch protection — succeeds if build-and-test passes or was skipped
  ci-gate:
    if: always()
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.build-and-test.result }}" =~ ^(success|skipped)$ ]]; then
            echo "CI passed (build-and-test: ${{ needs.build-and-test.result }})"
          else
            echo "CI failed (build-and-test: ${{ needs.build-and-test.result }})"
            exit 1
          fi
