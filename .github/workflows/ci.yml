name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which files changed — no third-party actions
  changes:
    runs-on: ubuntu-latest
    outputs:
      native_or_packaging: ${{ steps.check.outputs.native_or_packaging }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for native or packaging changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only HEAD^1 HEAD -- \
              'native/' \
              'assets/' \
              'scripts/build_native_app.sh' \
              'scripts/test_packaged_cli.sh' \
              '.github/workflows/ci.yml')
          else
            FILES=$(git diff --name-only HEAD~1 HEAD -- \
              'native/' \
              'assets/' \
              'scripts/build_native_app.sh' \
              'scripts/test_packaged_cli.sh' \
              '.github/workflows/ci.yml')
          fi
          if [ -n "$FILES" ]; then
            echo "native_or_packaging=true" >> "$GITHUB_OUTPUT"
            echo "Native or packaging files changed:"
            echo "$FILES"
          else
            echo "native_or_packaging=false" >> "$GITHUB_OUTPUT"
            echo "No native or packaging files changed — skipping build"
          fi

  # Release build — validate the app product compiles in release mode
  build_release:
    needs: changes
    if: needs.changes.outputs.native_or_packaging == 'true'
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build (release)
        run: swift build --package-path native/MuesliNative -c release --product MuesliNativeApp

  # Swift tests — sharded by domain to reduce end-to-end wall time
  test_shards:
    needs: changes
    if: needs.changes.outputs.native_or_packaging == 'true'
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [core, dictation-transcription, meetings]
    name: test (${{ matrix.shard }})
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run test shard
        run: bash ./scripts/run_ci_test_shard.sh "${{ matrix.shard }}"

  # Packaged CLI smoke test — verify the app bundle contains muesli-cli
  cli-smoke:
    needs: changes
    if: needs.changes.outputs.native_or_packaging == 'true'
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify packaged CLI bundle
        run: ./scripts/test_packaged_cli.sh

  # Gate job — always runs, always reports a status
  # This is the only required check in branch protection
  ci-gate:
    if: always()
    needs: [changes, build_release, test_shards, cli-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.build_release.result }}" =~ ^(success|skipped)$ ]] && \
             [[ "${{ needs.test_shards.result }}" =~ ^(success|skipped)$ ]] && \
             [[ "${{ needs.cli-smoke.result }}" =~ ^(success|skipped)$ ]]; then
            echo "CI passed (build_release: ${{ needs.build_release.result }}, test_shards: ${{ needs.test_shards.result }}, cli-smoke: ${{ needs.cli-smoke.result }})"
          else
            echo "CI failed (build_release: ${{ needs.build_release.result }}, test_shards: ${{ needs.test_shards.result }}, cli-smoke: ${{ needs.cli-smoke.result }})"
            exit 1
          fi
